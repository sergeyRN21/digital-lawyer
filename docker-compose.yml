services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./app:/app/app
      - huggingface_cache:/app/huggingface_cache  # Кэш моделей
      - ./huggingface_cache:/root/.cache/huggingface  # Альтернативный путь кэша
    environment:
      - GIGACHAT_CREDENTIALS=${GIGACHAT_CREDENTIALS}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - TRANSFORMERS_CACHE=/app/huggingface_cache
      - HF_HOME=/app/huggingface_cache
      - SENTENCE_TRANSFORMERS_HOME=/app/huggingface_cache
    depends_on:
      - qdrant
    stdin_open: true
    tty: true
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/data
    environment:
      - QDRANT__STORAGE__PATH=/qdrant/data

volumes:
  huggingface_cache:  # Volume для кэша моделей
  qdrant_data:        # Volume для данных Qdrant